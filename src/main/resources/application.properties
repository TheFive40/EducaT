spring.application.name=EducaT
spring.datasource.url=jdbc:postgresql://localhost:5432/practice
spring.datasource.username=postgres
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
server.port=8010

# File upload limits (increase to 50MB)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Disable DevTools restart to prevent connection resets
spring.devtools.restart.enabled=false

# Storage Management Configuration
educat.storage.base-path=./educat-uploads
educat.storage.max-file-size=26214400
educat.storage.global-limit=107374182400
educat.storage.compression-enabled=true
educat.storage.orphan-cleanup-enabled=true

# Retention Policies (days)
# Audit logs: 90 days (3 months)
educat.audit.retention-days=90
# Activity submissions: 180 days (6 months) - keeps grades, removes files
educat.submission.retention-days=180
# Certificates: 730 days (2 years)
educat.certificate.retention-days=730